<!DOCTYPE html>
<html>

<head>
    <title>Training Course Signup</title>

</head>

<body font-family: Arial, sans-serif; margin: 30px;>

    <h2>Training Course Signup</h2>
    <p>Sign-up for a training course using this form.</p>

    <form max-width: 500px;>
        <label display: block; margin-top: 20px; height="10px" widht="30" for=" title ">Title<br></label>
        <input type="text " id="title " name="title "><br><br>


        <label class="required " for="firstname ">First name*</label>
        <input type="text " id="firstname " name="firstname " required>
        <label class="required " for="Last Name ">Last Name*</label>
        <input type="Last Name " id="email " name="Last Name " required>
        <br><br>
        <label for="email ">Email</label>
        <input type="email " name="email "><br>
        <br> <label class="required " for="phone ">Phone</label>
        <input type="tel " id="phone " name="phone " required>
        <br>
        <label class="required " for="company ">Company</label>
        <input type="text " id="company " name="company " required>
        <br>
        <label for="position ">Position</label>
        <input type="text " id="position " name="position ">
        <br>
        <label class="required " for="address ">Address</label>
        <input type="text " id="address " name="address " required>
        <br>
        <label class="required " for="city ">City</label>
        <input type="text " id="city " name="city " required>
        <br>
        <label for="state ">State/Province</label>
        <select width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; id="state " name="state ">
      <option value="AK ">AK</option>
      <option value="CA ">CA</option>
      <option value="NY ">NY</option>
      <!-- Add more as needed -->
    </select>

        <label class="required " for="country ">Country</label>
        <select id="country " name="country " required>
      <option value="Afghanistan ">Afghanistan</option>
      <option value="India ">India</option>
      <option value="United States ">United States</option>
      <!-- Add more countries if needed -->
    </select>

        <input type="submit " value="Submit ">
    </form>

</body>

</html>
