Here's the HTML code for the Registration Form as shown in the image:

<!DOCTYPE html>
<html>

<head>
    <title>Registration Form</title>

</head>

<body>

    <div class="form-container">
        <h2><b>Registration form</b></h2>
        <form action="#" method="post">
            <label for="id">Id:</label><input type="text" id="id" name="id"><br><br>
            <label for="name">Name:</label><input type="text" id="name" name="name"><br><br>
            <label for="course">Course:</label><input type="text" id="course" name="course"><br><br>
            <label for="branch">Branch:</label>
            <input type="text" id="branch" name="branch"><br><br>
            <label for="rollno">Rollno:</label><input type="text" id="rollno" name="rollno"><br><br>
            <label for="email">Email_Address:</label><input type="email" id="email" name="email"><br><br>
            <label for="username">User_Name:</label>
            <input type="text" id="username" name="username"><br><br>

            <label for="about">About Us:</label><textarea id="about" name="about" rows="2" cols="20"></textarea><br><br>
            <label for="password">Password:</label><input type="password" id="password" name="password"><br><br>
            <input class="submit-button" type="submit" value="Add"></form>
    </div>
</body>

</html>
