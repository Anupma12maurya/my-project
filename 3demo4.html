<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Form</title>
</head>

<body>
    <h1>Fill out the form below:</h1>
    Name: <input type="text"><br><br>Gender:

    <input type="SUBMIT" placeholder="SUBMIT" />

</body>

</html>
